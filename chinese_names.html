<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Кит. имена">
<meta name="theme-color" content="#f0f0f0">
<title>Тренажёр китайских имён</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    background: #f0f0f0;
    color: #333;
    min-height: 100vh;
    overscroll-behavior: none;
  }
  body {
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }
  .container {
    max-width: 600px;
    width: 100%;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    flex: 1;
  }
  h1 {
    text-align: center;
    font-size: 20px;
    margin: 10px 0 6px;
    color: #333;
    font-weight: 600;
  }
  .counter {
    text-align: center;
    color: #888;
    font-size: 14px;
    margin-bottom: 20px;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 30px 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    margin-bottom: 16px;
    min-height: 200px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }
  .chinese {
    font-size: 32px;
    font-weight: 700;
    color: #c00;
    text-align: center;
    line-height: 1.3;
    margin-bottom: 16px;
    word-break: break-word;
  }
  .russian {
    font-size: 22px;
    color: #005;
    text-align: center;
    line-height: 1.3;
    min-height: 28px;
    transition: opacity 0.2s;
  }
  .russian:empty { opacity: 0; }
  .status {
    text-align: center;
    color: #888;
    font-size: 13px;
    font-style: italic;
    min-height: 18px;
    margin-bottom: 8px;
  }
  .buttons {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 12px;
  }
  button {
    -webkit-appearance: none;
    appearance: none;
    border: none;
    border-radius: 12px;
    padding: 16px 8px;
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    cursor: pointer;
    font-family: inherit;
    transition: transform 0.1s, opacity 0.2s;
    user-select: none;
  }
  button:active { transform: scale(0.96); }
  button:disabled { opacity: 0.5; }
  .btn-play { background: #4a90e2; }
  .btn-check { background: #7ed321; }
  .btn-next { background: #f5a623; }
  .extra-buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .btn-shuffle { background: #9b9b9b; }
  .btn-rate { background: #5856d6; }
  .controls-row {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
    align-items: center;
  }
  .rate-control {
    flex: 1;
    background: #fff;
    border-radius: 12px;
    padding: 10px 14px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  }
  .rate-control label {
    display: block;
    font-size: 12px;
    color: #888;
    margin-bottom: 4px;
  }
  .rate-control input {
    width: 100%;
    -webkit-appearance: none;
    height: 4px;
    background: #ddd;
    border-radius: 2px;
    outline: none;
  }
  .rate-control input::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px; height: 22px;
    background: #5856d6;
    border-radius: 50%;
  }
  .rate-value {
    font-size: 13px;
    color: #5856d6;
    font-weight: 600;
  }
  .install-hint {
    text-align: center;
    font-size: 12px;
    color: #aaa;
    margin-top: auto;
    padding: 16px 8px 4px;
    line-height: 1.5;
  }
  .install-hint b { color: #888; }
  @media (max-width: 380px) {
    .chinese { font-size: 26px; }
    .russian { font-size: 19px; }
    button { font-size: 14px; padding: 14px 4px; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>Тренажёр китайских имён</h1>
  <div class="counter" id="counter">—</div>

  <div class="card">
    <div class="chinese" id="chinese">—</div>
    <div class="russian" id="russian"></div>
  </div>

  <div class="status" id="status"></div>

  <div class="buttons">
    <button class="btn-play" id="btn-play">🔊 Произнести</button>
    <button class="btn-check" id="btn-check">Проверить</button>
    <button class="btn-next" id="btn-next">Далее ▶</button>
  </div>

  <div class="controls-row">
    <div class="rate-control">
      <label>Скорость произношения: <span class="rate-value" id="rate-value">1.0×</span></label>
      <input type="range" id="rate" min="0.5" max="1.5" step="0.1" value="1.0">
    </div>
  </div>

  <div class="extra-buttons">
    <button class="btn-shuffle" id="btn-shuffle">🔀 Перемешать</button>
    <button class="btn-rate" id="btn-auto">▶ Авто-режим</button>
  </div>

  <div class="install-hint">
    Чтобы добавить на главный экран iPhone:<br>
    нажмите <b>«Поделиться»</b> в Safari → <b>«На экран „Домой"»</b>
  </div>
</div>

<script>
"use strict";

const NAMES = [
  ["Бабаев Кирилл Владимирович", "巴巴耶夫·基里尔·弗拉基米罗维奇"],
  ["Белоусов Андрей Рэмович", "别洛乌索夫·安德烈·雷莫维奇"],
  ["Вайно Антон Эдуардович", "瓦伊诺·安东·爱德华多维奇"],
  ["Горбачёв Михаил Сергеевич", "戈尔巴乔夫·米哈伊尔·谢尔盖耶维奇"],
  ["Ельцин Борис Николаевич", "叶利钦·鲍里斯·尼古拉耶维奇"],
  ["Жириновский Владимир Вольфович", "日里诺夫斯基·弗拉基米尔·沃尔福维奇"],
  ["Зюганов Геннадий Андреевич", "久加诺夫·根纳季·安德烈耶维奇"],
  ["Кириенко Сергей Владиленович", "基里延科·谢尔盖·弗拉基连诺维奇"],
  ["Лужков Юрий Михайлович", "卢日科夫·尤里·米哈伊洛维奇"],
  ["Мантуров Денис Валентинович", "曼图罗夫·丹尼斯·瓦连京诺维奇"],
  ["Маслов Алексей Александрович", "马斯洛夫·阿列克谢·亚历山德罗维奇"],
  ["Матвиенко Валентина Ивановна", "马特维延科·瓦莲京娜·伊万诺夫娜"],
  ["Медведев Дмитрий Анатольевич", "梅德韦杰夫·德米特里·阿纳托利耶维奇"],
  ["Милонов Сергей Владимирович", "米洛诺夫·谢尔盖·弗拉基米罗维奇"],
  ["Набиуллина Эльвира Сахипзадовна", "纳比乌林娜·埃莉维拉·萨希普扎多夫娜"],
  ["Навальный Алексей Анатольевич", "纳瓦利内·阿列克谢·阿纳托利耶维奇"],
  ["Новак Александр Валентинович", "诺瓦克·亚历山大·瓦连京诺维奇"],
  ["Памфилова Элла Александровна", "帕姆菲洛娃·埃拉·亚历山德罗夫娜"],
  ["Патрушев Николай Платонович", "帕特鲁舍夫·尼古拉·普拉托诺维奇"],
  ["Песков Дмитрий Сергеевич", "佩斯科夫·德米特里·谢尔盖耶维奇"],
  ["Примаков Евгений Максимович", "普里马科夫·叶夫根尼·马克西莫维奇"],
  ["Сечин Игорь Иванович", "谢钦·伊戈尔·伊万诺维奇"],
  ["Силуанов Антон Германович", "西卢阿诺夫·安东·格尔马诺维奇"],
  ["Сталин Иосиф Виссарионович", "斯大林·约瑟夫·维萨里奥诺维奇"],
  ["Трутнев Юрий Петрович", "特鲁特涅夫·尤里·彼得罗维奇"],
  ["Хрущёв Никита Сергеевич", "赫鲁晓夫·尼基塔·谢尔盖耶维奇"],
  ["Хуснуллин Марат Шакирзянович", "胡斯努林·马拉特·沙基尔贾诺维奇"],
  ["Черномырдин Виктор Степанович", "切尔诺梅尔金·维克托·斯捷潘诺维奇"],
  ["Шахрай Сергей Михайлович", "沙赫赖·谢尔盖·米哈伊洛维奇"],
  ["Шойгу Сергей Кужугетович", "绍伊古·谢尔盖·库茹盖托维奇"],
  ["Цивилёв Сергей Евгеньевич", "谢尔盖·齐维列夫"],
  ["Миллер Алексей Борисович", "阿列克谢·米勒"],
  ["Александр II", "亚历山大二世"],
  ["Александр Лукашенко", "亚历山大·卢卡申科"],
  ["Александр Пушкин", "亚历山大·普希金"],
  ["Алексей Толстой", "阿列克谢·托尔斯泰"],
  ["Анатолий Торкунов", "阿纳托利·托尔库诺夫"],
  ["Антониу Гутерриш", "安东尼奥·古特雷斯"],
  ["Барак Обама", "贝拉克·奥巴马"],
  ["Владимир Зеленский", "弗拉基米尔·泽连斯基"],
  ["Вячеслав Володин", "维亚切斯拉夫·沃洛金"],
  ["Джеки Чан", "成龙"],
  ["Джо Байден", "乔·拜登"],
  ["Елизавета II", "伊丽莎白二世"],
  ["Карл III", "查理三世"],
  ["Кир Стармер", "基尔·斯塔默"],
  ["Маргарет Тэтчер", "玛格丽特·撒切尔"],
  ["Михаил Ломоносов", "米哈伊尔·罗蒙诺索夫"],
  ["Михаил Мишустин", "米哈伊尔·米舒斯京"],
  ["Мария Захарова", "玛丽亚·扎哈罗娃"],
  ["Пётр I", "彼得一世"],
  ["Принц Чарльз", "查尔斯王子"],
  ["Сергей Викторович Лавров", "谢尔盖·维克托罗维奇·拉夫罗夫"],
  ["Сергей Собянин", "谢尔盖·索比亚宁"],
  ["Урсула фон дер Ляйен", "乌尔苏拉·冯德莱恩"],
  ["Олаф Шольц", "奥拉夫·朔尔茨"],
  ["Ольга Ткачук", "奥莉加·特卡丘克"],
  ["Ольга Новикова", "奥莉加·诺维科娃"],
  ["Богдан Морозов", "波格丹·莫罗佐夫"],
  ["Андрей Бубнов", "安德烈·布勃诺夫"],
  ["Дарья Морозова", "达里娅·莫罗佐娃"],
  ["Анастасия Володина", "阿纳斯塔西娅·沃洛金娜"],
  ["Арина Криштафович", "阿琳娜·克里什塔福维奇"],
  ["Елизавета Самсоненко", "伊丽莎白·萨姆索年科"],
  ["Ирина Гурман", "伊琳娜·古尔曼"],
  ["Анна Сурикова", "安娜·苏里科娃"],
  ["Ульяна Сафронова", "乌里扬娜·萨夫罗诺娃"],
  ["Вадим Володченко", "瓦季姆·沃洛德琴科"],
  ["Елена Кривонос", "叶连娜·克里沃诺斯"],
];

// Состояние
let order = [];
let currentIndex = 0;
let speechRate = 1.0;
let chineseVoice = null;
let autoMode = false;
let autoTimer = null;

// Элементы
const $chinese = document.getElementById("chinese");
const $russian = document.getElementById("russian");
const $counter = document.getElementById("counter");
const $status = document.getElementById("status");
const $btnPlay = document.getElementById("btn-play");
const $btnCheck = document.getElementById("btn-check");
const $btnNext = document.getElementById("btn-next");
const $btnShuffle = document.getElementById("btn-shuffle");
const $btnAuto = document.getElementById("btn-auto");
const $rate = document.getElementById("rate");
const $rateValue = document.getElementById("rate-value");

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function pickChineseVoice() {
  const voices = speechSynthesis.getVoices();
  // Предпочитаем zh-CN, потом любой китайский
  let v = voices.find(x => x.lang === "zh-CN" || x.lang === "zh_CN");
  if (!v) v = voices.find(x => x.lang && x.lang.toLowerCase().startsWith("zh"));
  return v || null;
}

function init() {
  order = shuffle([...Array(NAMES.length).keys()]);
  currentIndex = 0;
  showCurrent();
}

function showCurrent() {
  const idx = order[currentIndex];
  $chinese.textContent = NAMES[idx][1];
  $russian.textContent = "";
  $counter.textContent = `Имя ${currentIndex + 1} из ${NAMES.length}`;
  $status.textContent = "";
}

function speak(text, onEnd) {
  // Сначала отменим предыдущее, если было
  speechSynthesis.cancel();

  const u = new SpeechSynthesisUtterance(text);
  u.lang = "zh-CN";
  u.rate = speechRate;
  u.pitch = 1.0;
  if (!chineseVoice) chineseVoice = pickChineseVoice();
  if (chineseVoice) u.voice = chineseVoice;

  u.onstart = () => { $status.textContent = "▶ Воспроизведение..."; };
  u.onend = () => {
    $status.textContent = "";
    if (onEnd) onEnd();
  };
  u.onerror = () => {
    $status.textContent = "";
  };
  speechSynthesis.speak(u);
}

function playCurrent(onEnd) {
  const idx = order[currentIndex];
  speak(NAMES[idx][1], onEnd);
}

function check() {
  const idx = order[currentIndex];
  $russian.textContent = NAMES[idx][0];
}

function nextName() {
  currentIndex++;
  if (currentIndex >= NAMES.length) {
    alert("Вы прошли все имена! Список будет перемешан заново.");
    stopAuto();
    init();
    return;
  }
  showCurrent();
  playCurrent(autoMode ? scheduleAutoNext : null);
}

function restart() {
  stopAuto();
  init();
}

// Автоматический режим: произносит имя → ждёт → показывает русский → ждёт → следующий
function scheduleAutoNext() {
  if (!autoMode) return;
  // Ждём 3 секунды после произношения, потом показываем русский
  autoTimer = setTimeout(() => {
    if (!autoMode) return;
    check();
    // Ждём ещё 3 секунды и идём дальше
    autoTimer = setTimeout(() => {
      if (!autoMode) return;
      nextName();
    }, 3000);
  }, 3000);
}

function startAuto() {
  autoMode = true;
  $btnAuto.textContent = "⏸ Стоп";
  $btnAuto.style.background = "#ff3b30";
  playCurrent(scheduleAutoNext);
}

function stopAuto() {
  autoMode = false;
  if (autoTimer) clearTimeout(autoTimer);
  autoTimer = null;
  speechSynthesis.cancel();
  $btnAuto.textContent = "▶ Авто-режим";
  $btnAuto.style.background = "";
  $status.textContent = "";
}

// События
$btnPlay.addEventListener("click", () => {
  if (autoMode) stopAuto();
  playCurrent();
});

$btnCheck.addEventListener("click", () => {
  check();
});

$btnNext.addEventListener("click", () => {
  if (autoMode) stopAuto();
  nextName();
});

$btnShuffle.addEventListener("click", () => {
  restart();
});

$btnAuto.addEventListener("click", () => {
  if (autoMode) stopAuto(); else startAuto();
});

$rate.addEventListener("input", () => {
  speechRate = parseFloat($rate.value);
  $rateValue.textContent = speechRate.toFixed(1) + "×";
});

// Загрузка голосов (на iOS они подгружаются асинхронно)
if (typeof speechSynthesis !== "undefined") {
  // Сразу пробуем
  chineseVoice = pickChineseVoice();
  // И слушаем событие на случай если ещё не загрузились
  speechSynthesis.addEventListener("voiceschanged", () => {
    chineseVoice = pickChineseVoice();
  });
} else {
  alert("Ваш браузер не поддерживает синтез речи. Используйте Safari на iPhone.");
}

// Запускаем
init();
</script>
</body>
</html>
